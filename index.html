<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portofolio Praktikum IoT | Ambadaya Gaman</title>
    <style>
        /* Tema Gelap Premium Senada dengan Dashboard */
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent-color: #10b981;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: #334155;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 90%;
            max-width: 650px;
            background-color: var(--card-bg);
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border-color);
            text-align: center;
        }

        /* Header / Identitas */
        h1 {
            font-size: 1.8rem;
            color: var(--text-main);
            margin-bottom: 5px;
            font-weight: 600;
        }

        .subtitle {
            color: var(--accent-color);
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 25px;
            font-weight: 500;
        }

        .bio-box {
            background-color: rgba(15, 23, 42, 0.6);
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 30px;
            border: 1px solid var(--border-color);
            text-align: left;
        }

        .bio-item {
            display: flex;
            margin-bottom: 10px;
            font-size: 0.95rem;
        }

        .bio-item:last-child {
            margin-bottom: 0;
        }

        .label {
            width: 80px;
            color: var(--text-muted);
            font-weight: 500;
        }

        .value {
            color: var(--text-main);
        }

        /* Section Link Proyek */
        .project-section {
            margin-top: 20px;
        }

        .project-section h3 {
            font-size: 1.1rem;
            color: var(--text-muted);
            text-align: left;
            margin-bottom: 15px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 8px;
        }

        /* Tombol Navigasi Link Premium */
        .project-link {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background-color: rgba(16, 185, 129, 0.1);
            color: var(--accent-color);
            text-decoration: none;
            padding: 16px 20px;
            border-radius: 10px;
            border: 1px solid rgba(16, 185, 129, 0.3);
            font-weight: 600;
            transition: all 0.3s ease;
            font-size: 1rem;
        }

        .project-link:hover {
            background-color: var(--accent-color);
            color: #000;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(16, 185, 129, 0.4);
        }

        .icon {
            font-size: 1.2rem;
        }

        /* Footer */
        footer {
            margin-top: 35px;
            font-size: 0.8rem;
            color: var(--text-muted);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Praktikum 13 IoT</h1>
        <div class="subtitle">Deployment Halaman Web ke Hosting</div>

        <div class="bio-box">
            <div class="bio-item">
                <span class="label">Nama</span>
                <span class="value">: Muhammad Ridho Aprilyan</span>
            </div>
            <div class="bio-item">
                <span class="label">NIM</span>
                <span class="value">: C020324019</span>
            </div>
            <div class="bio-item">
                <span class="label">Kelas</span>
                <span class="value">: Elektronika 4A</span>
            </div>
            <div class="bio-item">
                <span class="label">Kampus</span>
                <span class="value">: Politeknik Negeri Banjarmasin</span>
            </div>
        </div>

        <div class="project-section">
            <h3>Daftar Proyek Praktikum</h3>
            <a href="./websocket-mqtt-client/" class="project-link">
                <span>🌐 WebSocket MQTT Client Dashboard</span>
                <span class="icon">➔</span>
            </a>
        </div>

        <footer>
            &copy; 2026 Ambadaya Gaman. Semua Hak Dilindungi.
        </footer>
    </div>

</body>
</html>
