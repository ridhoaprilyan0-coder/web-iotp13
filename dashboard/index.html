<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MQTT WebSocket Dashboard Premium</title>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  
  <style>
    /* Custom Scrollbar untuk kotak Messages */
    #messages::-webkit-scrollbar {
      width: 6px;
    }
    #messages::-webkit-scrollbar-track {
      background: #1e293b;
    }
    #messages::-webkit-scrollbar-thumb {
      background: #475569;
      border-radius: 3px;
    }
  </style>
</head>
<body class="bg-slate-900 text-slate-100 font-sans min-h-screen py-10 px-4">

  <div class="max-width-3xl mx-auto max-w-3xl">
    
    <header class="text-center mb-8">
      <h1 class="text-3xl font-extrabold tracking-tight bg-gradient-to-r from-blue-400 to-emerald-400 bg-clip-text text-transparent">
        MQTT WebSocket Dashboard
      </h1>
      <p class="text-sm text-slate-400 mt-2">Sistem Monitoring & Kendali IoT Real-Time</p>
    </header>

    <div id="status" class="w-full py-3 px-4 rounded-xl font-bold text-center mb-6 shadow-lg transition-all duration-300 bg-rose-500/20 text-rose-300 border border-rose-500/30 backdrop-blur-sm">
      Disconnection / Not Connected
    </div>

    <div class="space-y-4">
      
      <div class="bg-slate-800/60 border border-slate-700/50 rounded-2xl shadow-xl overflow-hidden backdrop-blur-md">
        <div class="card-header bg-gradient-to-r from-slate-800 to-slate-700/50 px-5 py-4 flex justify-between items-center cursor-pointer hover:bg-slate-700/30 transition-colors">
          <span class="font-semibold text-slate-200 flex items-center gap-2">
            ⚙️ MQTT Broker Configuration
          </span>
          <span class="text-xs text-slate-400 select-none">Klik untuk Collapse</span>
        </div>
        <div class="card-content p-5 space-y-4 border-t border-slate-700/30">
          <div class="grid grid-cols-1 md:grid-cols-4 gap-3">
            <div>
              <label class="block text-xs font-medium text-slate-400 mb-1">Protocol</label>
              <select id="protocol" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-3 py-2 text-sm focus:outline-none focus:border-blue-500 text-slate-200">
                <option value="wss">wss (Secure)</option>
                <option value="ws">ws</option>
              </select>
            </div>
            <div class="md:col-span-2">
              <label class="block text-xs font-medium text-slate-400 mb-1">Broker Host</label>
              <input id="broker" value="broker.emqx.io" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-3 py-2 text-sm focus:outline-none focus:border-blue-500 text-slate-200">
            </div>
            <div>
              <label class="block text-xs font-medium text-slate-400 mb-1">Port</label>
              <input id="port" value="8084" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-3 py-2 text-sm focus:outline-none focus:border-blue-500 text-slate-200">
            </div>
          </div>
          <div>
            <label class="block text-xs font-medium text-slate-400 mb-1">Path</label>
            <input id="path" value="/mqtt" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-3 py-2 text-sm focus:outline-none focus:border-blue-500 text-slate-200">
          </div>
          <button id="connectBtn" class="w-full bg-blue-600 hover:bg-blue-500 active:scale-[0.99] text-white font-semibold py-2.5 px-4 rounded-xl shadow-lg shadow-blue-600/20 transition-all duration-150">
            Connect to Broker
          </button>
        </div>
      </div>

      <div class="bg-slate-800/60 border border-slate-700/50 rounded-2xl shadow-xl overflow-hidden backdrop-blur-md">
        <div class="card-header bg-gradient-to-r from-slate-800 to-slate-700/50 px-5 py-4 flex justify-between items-center cursor-pointer hover:bg-slate-700/30 transition-colors">
          <span class="font-semibold text-slate-200 flex items-center gap-2">
            📥 Subscribe Topic
          </span>
          <span class="text-xs text-slate-400 select-none">Klik untuk Expand</span>
        </div>
        <div class="card-content p-5 space-y-3 border-t border-slate-700/30 hidden">
          <input id="subtopic" placeholder="Masukkan topik untuk didengar (ex: poliban/elka/suhu)" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-3 py-2 text-sm focus:outline-none focus:border-emerald-500 text-slate-200">
          <button id="subscribeBtn" class="w-full bg-emerald-600 hover:bg-emerald-500 active:scale-[0.99] text-white font-semibold py-2.5 px-4 rounded-xl shadow-lg shadow-emerald-600/20 transition-all duration-150">
            Subscribe
          </button>
        </div>
      </div>

      <div class="bg-slate-800/60 border border-slate-700/50 rounded-2xl shadow-xl overflow-hidden backdrop-blur-md">
        <div class="card-header bg-gradient-to-r from-slate-800 to-slate-700/50 px-5 py-4 flex justify-between items-center cursor-pointer hover:bg-slate-700/30 transition-colors">
          <span class="font-semibold text-slate-200 flex items-center gap-2">
            📤 Publish Message
          </span>
          <span class="text-xs text-slate-400 select-none">Klik untuk Expand</span>
        </div>
        <div class="card-content p-5 space-y-3 border-t border-slate-700/30 hidden">
          <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
            <input id="pubtopic" placeholder="Topik target (ex: poliban/elka/relay)" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-3 py-2 text-sm focus:outline-none focus:border-amber-500 text-slate-200">
            <input id="message" placeholder="Isi pesan / data payload (ex: ON)" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-3 py-2 text-sm focus:outline-none focus:border-amber-500 text-slate-200">
          </div>
          <button id="publishBtn" class="w-full bg-amber-600 hover:bg-amber-500 active:scale-[0.99] text-white font-semibold py-2.5 px-4 rounded-xl shadow-lg shadow-amber-600/20 transition-all duration-150">
            Publish Data
          </button>
        </div>
      </div>

      <div class="bg-slate-800/60 border border-slate-700/50 rounded-2xl shadow-xl overflow-hidden backdrop-blur-md">
        <div class="px-5 py-4 flex justify-between items-center bg-gradient-to-r from-slate-800 to-slate-700/50 border-b border-slate-700/30">
          <span class="font-semibold text-slate-200 flex items-center gap-2">
            💬 Live Monitor Messages
          </span>
          <button id="clearBtn" class="flex items-center gap-1.5 px-2.5 py-1 text-xs font-medium text-rose-400 hover:text-rose-300 bg-rose-500/10 hover:bg-rose-500/20 border border-rose-500/20 rounded-lg transition-all duration-150 active:scale-95">
            🗑️ Clear Logs
          </button>
        </div>
        <div class="p-5">
          <div id="messages" class="w-full bg-slate-950 text-emerald-400 p-4 h-52 overflow-y-auto font-mono text-xs rounded-xl border border-slate-900 whitespace-pre-wrap shadow-inner">Waiting live data network stream...</div>
        </div>
      </div>

    </div>
  </div>

  <script>
    const $ = id => document.getElementById(id);
    let client = null;
    let connected = false;

    // Animasi Accordion / Collapse yang lebih rapi
    document.querySelectorAll(".card-header").forEach(header => {
      header.addEventListener("click", () => {
        const content = header.nextElementSibling;
        content.classList.toggle("hidden");
      });
    });

    const log = text => {
      const msgBox = $("messages");
      const time = new Date().toLocaleTimeString();
      // Menghapus pesan 'Waiting live data...' jika data baru masuk pertama kali
      if (msgBox.innerHTML.includes("Waiting live data")) {
        msgBox.innerHTML = "";
      }
      msgBox.innerHTML += `[${time}] ${text}\n`;
      msgBox.scrollTop = msgBox.scrollHeight;
    };

    const setStatus = (text, type) => {
      const status = $("status");
      status.textContent = text;
      if (type === "success") {
        status.className = "w-full py-3 px-4 rounded-xl font-bold text-center mb-6 shadow-lg transition-all duration-300 bg-emerald-500/20 text-emerald-300 border border-emerald-500/30 backdrop-blur-sm shadow-emerald-500/5";
      } else if (type === "danger") {
        status.className = "w-full py-3 px-4 rounded-xl font-bold text-center mb-6 shadow-lg transition-all duration-300 bg-rose-500/20 text-rose-300 border border-rose-500/30 backdrop-blur-sm shadow-rose-500/5";
      } else {
        status.className = "w-full py-3 px-4 rounded-xl font-bold text-center mb-6 shadow-lg transition-all duration-300 bg-blue-500/20 text-blue-300 border border-blue-500/30 backdrop-blur-sm shadow-blue-500/5";
      }
    };

    // FUNGSI TOMBOL CLEAR UNTUK MENGHAPUS TEKS LOGS
    $("clearBtn").addEventListener("click", () => {
      $("messages").innerHTML = "Logs cleared.\n";
    });

    $("connectBtn").addEventListener("click", () => {
      const protocol = $("protocol").value;
      const broker = $("broker").value;
      const port = parseInt($("port").value);
      const path = $("path").value;

      const clientID = "web_" + Math.random().toString(16).substr(2, 8);

      client = new Paho.MQTT.Client(broker, port, path, clientID);

      client.onConnectionLost = () => {
        connected = false;
        setStatus("⚠️ Connection Lost", "danger");
        log("System Network Status: Connection Lost");
      };

      client.onMessageArrived = message => {
        log(`Topic: ${message.destinationName} ➡️ Payload: ${message.payloadString}`);
      };

      setStatus("⏳ Connecting to Broker...", "primary");

      client.connect({
        useSSL: protocol === "wss",
        timeout: 5,
        onSuccess: () => {
          connected = true;
          setStatus(`✅ Connected to ${broker}`, "success");
          log(`Successfully connected to secure ecosystem broker: ${broker}`);
        },
        onFailure: err => {
          connected = false;
          setStatus("❌ Connection Failed", "danger");
          log("Failed to access infrastructure: " + err.errorMessage);
        }
      });
    });

    $("subscribeBtn").addEventListener("click", () => {
      if (!connected) return alert("Koneksi gagal: Mohon klik tombol Connect ke broker terlebih dahulu.");
      const topic = $("subtopic").value;
      if(!topic) return alert("Topik subscribe kosong!");
      client.subscribe(topic);
      log("Subscribed event targeted channel: " + topic);
    });

    $("publishBtn").addEventListener("click", () => {
      if (!connected) return alert("Koneksi gagal: Mohon klik tombol Connect ke broker terlebih dahulu.");
      const topic = $("pubtopic").value;
      const msg = $("message").value;
      if(!topic || !msg) return alert("Topik atau Pesan publish kosong!");
      const message = new Paho.MQTT.Message(msg);
      message.destinationName = topic;
      client.send(message);
      log(`Sent to [${topic}]: ${msg}`);
    });
  </script>

</body>
</html>
